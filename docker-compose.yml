services:
  wallet-db:
    image: postgres:17
    environment:
      POSTGRES_DB: wallet
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
    ports:
      - "5432:5432"
    volumes:
      - wallet-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet"]
      interval: 5s
      timeout: 5s
      retries: 5

  kyc-db:
    image: postgres:17
    environment:
      POSTGRES_DB: kyc
      POSTGRES_USER: kyc
      POSTGRES_PASSWORD: kyc
    ports:
      - "5433:5432"
    volumes:
      - kyc-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyc"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  wallet-db-data:
  kyc-db-data:
